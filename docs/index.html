        copy: `Esta camada sustenta dois objetivos centrais da solução: operar múltiplas unidades de negócio dentro de uma mesma base e manter a visão consolidada do cliente em todo o grupo.

        title: "02. Segmentos, produtos e bundles",
        copy: `Esta camada define a composição da oferta disponível em cada operação comercial.

Ela organiza segmentos, produtos e bundles dentro de uma mesma lógica comercial.

Os segmentos estruturam o catálogo. Os produtos representam ofertas simples. Os bundles representam ofertas compostas.

### Regras da camada

#### Regras de preço do grupo

- \`pricing_type\` define como o preço da oferta composta será tratado.
- Exemplos: \`FIXED\`, \`SUM\`, \`DISCOUNTED_SUM\`, \`CUSTOM\`.

#### Leituras possíveis para \`pricing_type\`

- \`FIXED\`: o grupo possui preço próprio.
- \`SUM\`: o preço é a soma dos itens.
- \`DISCOUNTED_SUM\`: o preço é a soma dos itens com desconto.
- \`CUSTOM\`: o preço segue uma regra específica.

#### Relação entre \`pricing_type\` e composição da oferta

- \`pricing_type\` define o preço da composição base do bundle.
- \`bundle_item\` representa apenas os produtos que compõem o bundle base.
- \`extra_price\` representa o acréscimo de itens opcionais, como no caso de "por mais X reais, leve também".
- \`offer_optional_product\` representa produtos opcionais ou de upsell associados a um produto ou bundle.
- O que faz parte do bundle base fica separado do que entra como ampliação comercial da oferta.

### Combinações possíveis

- Segmento com apenas produtos simples.
- Segmento com produtos simples e bundles na mesma linha comercial.
- Bundle com produtos incluídos no preço base.
- Bundle com produto opcional e acréscimo de valor.
- Produto com outro produto opcional associado por valor incremental.
- Produto com produto de upsell para ampliar ticket médio.`,

            title: "2.3 Oferta com produto opcional",
            copy: `A oferta pode ter uma composição base e, ao mesmo tempo, oferecer produtos adicionais por valor incremental. Esse formato suporta cenários como "por mais X reais, leve também", tanto em produto quanto em bundle.

Quando o \`pricing_type\` for \`FIXED\`, o preço do bundle representa apenas a composição base registrada em \`bundle_item\`. Nesse caso, o produto opcional deve ser somado ao valor final por meio de \`extra_price\`, sem alterar o preço base já definido para a oferta. Em produto simples, a mesma lógica vale para um produto adicional associado à oferta principal.

Quando o \`pricing_type\` for \`SUM\`, o preço do bundle deve ser calculado a partir da soma dos produtos incluídos em \`bundle_item\`. Se o cliente selecionar um produto opcional, o sistema deve acrescentar esse item ao cálculo final, usando o valor definido em \`extra_price\` ou a regra comercial prevista para esse adicional.

Em ambos os casos, o comportamento esperado é separar com clareza o que faz parte da composição base da oferta e o que entra como ampliação opcional.

Em produto simples, dois comportamentos importantes são:

- \`OPTIONAL\`: o cliente pode adicionar outro produto por um valor incremental conhecido.
- \`UPSELL\`: o cliente recebe uma proposta de ampliação de ticket com um produto adicional associado à oferta principal.`,

Os meios de pagamento pertencem ao contexto de venda e podem variar por canal, operação e política comercial.

As regras específicas por oferta ficam registradas separadamente, permitindo controlar parcelamento, desconto e elegibilidade por combinação entre produto ou bundle e método de pagamento.

Na prática, essa camada permite configurar cenários como desconto no Pix, limite de parcelas no cartão ou regras específicas para uma oferta composta.

### Casos de uso comuns

- Um contexto permite cartão, Pix e boleto ao mesmo tempo.
- Um produto aceita até 12 parcelas no cartão.
- Outro produto aceita menos parcelas, mesmo usando o mesmo meio de pagamento.
- Um bundle pode ter condição própria de parcelamento.
- Uma oferta pode conceder desconto específico em Pix.

### Combinações possíveis

- Mesmo meio de pagamento com regras diferentes por oferta.
- Produto com desconto no Pix e bundle sem desconto.
- Oferta com cartão habilitado e boleto desabilitado.
- Oferta simples e bundle compartilhando o mesmo meio de pagamento, mas com limites de parcelas diferentes.

### Hierarquia de decisão

1. Regra específica da oferta.
2. Regra do segmento.

      CUSTOMER_PAYMENT_METHOD: ["id: Integer", "customer_id: Integer", "context_id: Integer", "payment_option_id: Integer", "provider: Varchar", "token: Varchar", "brand: Varchar", "last4: Varchar", "holder_name: Varchar", "exp_month: Integer", "exp_year: Integer", "is_default: Boolean", "reusable: Boolean", "status: Varchar", "consented_at: Timestamp", "revoked_at: Timestamp", "info: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      CUSTOMER_PRODUCT_PREFERENCE: ["id: Integer", "customer_id: Integer", "target_type: Varchar", "target_external_id: Varchar", "preference_type: Varchar", "status: Varchar", "source: Varchar", "effective_at: Timestamp", "expires_at: Timestamp", "info: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      CART: ["id: Integer", "customer_id: Integer", "context_id: Integer", "status: Varchar", "created_at: Timestamp", "updated_at: Timestamp"],
      CART_ITEM: ["id: Integer", "cart_id: Integer", "product_id: Integer", "bundle_id: Integer", "quantity: Integer", "unit_price: Decimal(12,2)", "list_price: Decimal(12,2)", "final_price: Decimal(12,2)", "metadata: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      CART_COUPON: ["id: Integer", "cart_id: Integer", "coupon_id: Integer", "code: Varchar", "status: Varchar", "created_at: Timestamp"],
      CART_ADJUSTMENT: ["id: Integer", "cart_id: Integer", "cart_item_id: Integer", "adjustment_type: Varchar", "reference_id: Integer", "description: Varchar", "amount: Decimal(12,2)", "created_at: Timestamp"],
      CART_PAYMENT: ["id: Integer", "cart_id: Integer", "payment_option_id: Integer", "customer_payment_method_id: Integer", "amount: Decimal(12,2)", "status: Varchar", "provider_transaction_id: Varchar", "info: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      PARTNER: ["id: Integer", "context_id: Integer", "name: Varchar", "code: Varchar", "type: Varchar", "status: Varchar", "info: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      PARTNER_LINK: ["id: Integer", "partner_id: Integer", "code: Varchar", "url: Varchar", "utm_source: Varchar", "utm_medium: Varchar", "utm_campaign: Varchar", "active: Boolean", "created_at: Timestamp", "updated_at: Timestamp"],
      PARTNER_BILLING_LINK: ["id: Integer", "partner_id: Integer", "context_id: Integer", "name: Varchar", "code: Varchar", "url: Varchar", "active: Boolean", "expires_at: Timestamp", "product_id: Integer", "bundle_id: Integer", "campaign_id: Integer", "coupon_id: Integer", "payment_option_id: Integer", "configs: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      ATTRIBUTION: ["id: Integer", "cart_id: Integer", "order_ref: Varchar", "partner_id: Integer", "partner_link_id: Integer", "coupon_id: Integer", "attribution_type: Varchar", "info: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      COMMISSION: ["id: Integer", "partner_id: Integer", "attribution_id: Integer", "commission_type: Varchar", "commission_value: Decimal(12,2)", "base_amount: Decimal(12,2)", "commission_amount: Decimal(12,2)", "status: Varchar", "info: Json", "created_at: Timestamp", "updated_at: Timestamp"],
      PAYOUT: ["id: Integer", "partner_id: Integer", "amount: Decimal(12,2)", "status: Varchar", "reference: Varchar", "info: Json", "created_at: Timestamp", "paid_at: Timestamp"]
    };

    const normalizeEntityKey = (label) => label.replace(/\s+/g, "_").replace(/\//g, "_").toUpperCase();
    const escapeHtml = (value = "") =>
      value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

    const renderMarkdown = (content = "") => window.marked ? window.marked.parse(content.trim()) : "";

    const slugify = (value = "") =>
      value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

    const renderSidebar = (items) => `
      <nav class="doc-sidebar-card">
        <p class="doc-sidebar-label">Navegação</p>
        <div class="doc-sidebar-links">
          ${items.map((section) => `
            <div class="doc-sidebar-group">
              <a class="doc-sidebar-link" href="#${section.id}">${section.title}</a>
              ${section.subsections?.length ? `
                <div class="doc-sidebar-sublinks">
                  ${section.subsections.map((subsection) => `
                    <a class="doc-sidebar-sublink" href="#${subsection.id}">${subsection.title}</a>
                  `).join("")}
                </div>
              ` : ""}
            </div>
          `).join("")}
        </div>
      </nav>
    `;

    const renderSection = (section) => `
      <section class="doc-section" id="${section.id}">
        <div class="doc-content">
          <p class="doc-label">${section.label}</p>
          <h2 class="doc-title">${section.title}</h2>
          ${section.copy ? `<div class="markdown-view mt-6">${renderMarkdown(section.copy)}</div>` : ""}
          ${section.diagram ? `
            <div class="diagram-wrap mt-8">
              <p class="diagram-hint">Passe o mouse sobre uma entidade para ver detalhes.</p>
              <pre class="mermaid">${escapeHtml(section.diagram)}</pre>
            </div>
          ` : ""}
          ${section.subsections ? section.subsections.map((subsection) => `
            <div class="subsection-block mt-8" id="${subsection.id}">
              <h3 class="subsection-title">${subsection.title}</h3>
              ${subsection.copy ? `<div class="markdown-view mt-3">${renderMarkdown(subsection.copy)}</div>` : ""}
              ${subsection.examples ? subsection.examples.map((example) => `
                <div class="subsection-example mt-5">
                  <h4 class="subsection-example-title">${example.title}</h4>
                  <details class="sql-example mt-3">
                    <summary>Exemplo SQL</summary>
                    <pre><code class="language-sql">${escapeHtml(example.sql)}</code></pre>
                  </details>
                </div>
              `).join("") : ""}
              ${subsection.sql ? `
                <details class="sql-example mt-5">
                  <summary>Exemplo SQL</summary>
                  <pre><code class="language-sql">${escapeHtml(subsection.sql)}</code></pre>
                </details>
              ` : ""}
            </div>
          `).join("") : ""}
          ${section.sql ? `
            <details class="sql-example mt-8">
              <summary>Exemplo SQL</summary>
              <pre><code class="language-sql">${escapeHtml(section.sql)}</code></pre>
            </details>
          ` : ""}
        </div>
      </section>
    `;

    let tooltip;

    const showTooltip = (event, entityName) => {
      const attributes = entityAttributes[entityName];
      if (!attributes || !tooltip) return;

      tooltip.querySelector(".entity-tooltip-title").textContent = entityName;
      tooltip.querySelector(".entity-tooltip-body").innerHTML = `
        <table class="entity-tooltip-table">
          <thead><tr><th>Campo</th><th>Tipo</th></tr></thead>
          <tbody>
            ${attributes.map((attribute) => {
              const [name, type] = attribute.split(": ");
              return `<tr><td><code>${name}</code></td><td>${type}</td></tr>`;
            }).join("")}
          </tbody>
        </table>
      `;

      tooltip.classList.add("visible");
      moveTooltip(event);
    };

    const hideTooltip = () => tooltip?.classList.remove("visible");

    const moveTooltip = (event) => {
      if (!tooltip) return;
      const offset = 18;
      const maxLeft = window.innerWidth - 440;
      const maxTop = window.innerHeight - 240;
      tooltip.style.left = `${Math.min(event.clientX + offset, maxLeft)}px`;
      tooltip.style.top = `${Math.min(event.clientY + offset, maxTop)}px`;
    };

    const bindEntityHover = () => {
      document.querySelectorAll(".diagram-wrap").forEach((wrap) => {
        if (wrap.dataset.bound === "true") return;
        const nodes = wrap.querySelectorAll("svg g.node");
        if (!nodes.length) return;
        wrap.dataset.bound = "true";
        nodes.forEach((node) => {
          const entityName = normalizeEntityKey(node.textContent.trim());
          if (!entityAttributes[entityName]) return;
          node.classList.add("interactive-entity");
          node.addEventListener("mouseenter", (event) => showTooltip(event, entityName));
          node.addEventListener("mousemove", moveTooltip);
          node.addEventListener("mouseleave", hideTooltip);
        });
      });
    };

    document.addEventListener("DOMContentLoaded", () => {
      const sectionsWithIds = sections.map((section) => ({
        ...section,
        id: slugify(section.title),
        subsections: section.subsections?.map((subsection) => ({
          ...subsection,
          id: slugify(subsection.title)
        }))
      }));

      const sidebarRoot = document.getElementById("sidebar-root");
      if (sidebarRoot) sidebarRoot.innerHTML = renderSidebar(sectionsWithIds);

      const sectionsRoot = document.getElementById("sections-root");
      if (sectionsRoot) sectionsRoot.innerHTML = sectionsWithIds.map(renderSection).join("");

      if (window.hljs) window.hljs.highlightAll();

      tooltip = document.createElement("div");
      tooltip.className = "entity-tooltip";
      tooltip.innerHTML = '<div class="entity-tooltip-title"></div><div class="entity-tooltip-body"></div>';
      document.body.appendChild(tooltip);

      let attempts = 0;
      const interval = setInterval(() => {
        bindEntityHover();
        attempts += 1;
        const rendered = document.querySelectorAll(".diagram-wrap svg").length === document.querySelectorAll(".diagram-wrap").length;
        if (rendered || attempts >= 20) clearInterval(interval);
      }, 250);

      window.addEventListener("scroll", hideTooltip, { passive: true });
    });
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="bg-stone-50 font-['Inter'] text-stone-900">
  <header class="border-b border-stone-200 bg-white">
    <div class="mx-auto max-w-[1500px] px-6 py-10 text-center">
      <p class="text-xs font-semibold uppercase tracking-[0.14em] text-stone-500">Documentação</p>
      <h1 class="mt-3 text-4xl font-semibold tracking-tight">Proposta técnica da Alura Bank</h1>
      <p class="mx-auto mt-4 max-w-3xl text-base leading-7 text-stone-600">
        Documento de referência da arquitetura funcional do domínio, com foco em estrutura, regras e apoio à evolução do modelo.
      </p>
    </div>
  </header>

  <main class="mx-auto max-w-[1500px] px-6 py-10">
    <div class="doc-layout">
      <aside class="doc-sidebar">
        <div id="sidebar-root"></div>
      </aside>
      <div id="sections-root" class="doc-main"></div>
    </div>
  </main>
</body>
</html>
